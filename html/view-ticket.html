<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>פנייה פתוחה - מערכת ליווי</title>
  <link rel="stylesheet" href="/CSS/site.css"/>
  <link rel="stylesheet" href="/CSS/view-ticket.css"/>
  <link rel="stylesheet" href="/CSS/Chatbot.css"/>
</head>
<body class="page">

  <div class="layout">
    <aside class="right-sidebar">
      <div class="brand">מערכת ליווי</div>
      <nav class="main-nav">
        <a href="/dashboard.html" class="nav-item" title="לא מיושם בסדנה">
          <span>דשבורד</span>
        </a>

        <a href="/student-cases.html" class="nav-item">
          <span>תיקי סטודנטים</span>
        </a>

        <a href="/tickets.html" class="nav-item active">
          <span>פניות ושיח יזום</span>
        </a>

        <a href="/adjustments.html" class="nav-item" title="לא מיושם בסדנה">
          <span>תגבורים והתאמות</span>
        </a>

        <a href="/progress.html" class="nav-item">
          <span>התקדמות ומשחוק</span>
        </a>

        <a href="/reports.html" class="nav-item" title="לא מיושם בסדנה">
          <span>דוחות ואחזור מידע</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="settings-link" title="לא מיושם בסדנה">הגדרות</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-right">
          <h1 class="page-title">פנייה פתוחה</h1>
        </div>
        <div class="topbar-center">
        </div>
        <div class="topbar-left">
          <button class="icon-btn">🔔</button>
          <div class="user-name">פולינה (רכזת)</div>
        </div>
      </header>

      <main class="content">
        <div class="ticket-container">

          <!-- כותרת הפנייה -->
          <div class="ticket-header-card table-card">
            <button class="back-btn" onclick="window.location.href='/tickets'">&#10094;</button>
            <div class="header-info">
              <h2 id="ticketSubject">טוען...</h2>
              <span class="status-pill" id="ticketStatus"></span>
            </div>
          </div>

          <!-- שרשור הודעות -->
          <div id="ticketMessagesContainer"></div>

          <!-- שדה תגובה -->
          <div class="table-card reply-card">
            <h4>תגובה</h4>
            <textarea id="replyContent" placeholder="כתבי תגובה..."></textarea>
            <div class="reply-footer">
              <button class="send-reply-btn" id="sendReplyBtn">שליחה</button>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="/JS/view-ticket.js"></script>
  <script src="/JS/chatbot-widget.js"></script>
</body>
</html>
