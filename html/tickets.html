<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פניות ושיח יזום - מערכת ליווי</title>
  <!-- חיבור לקבצי ה-CSS הקיימים שלך -->

  <link rel="stylesheet" href="/CSS/site.css" />
  <link rel="stylesheet" href="/CSS/student-cases.css" />
  <link rel="stylesheet" href="/CSS/tickets.css" />
  <link rel="stylesheet" href="/CSS/Chatbot.css" />
  <link rel="stylesheet" href="../python/static/Chatbot.css" />
</head>

<body class="page">
  <div class="layout">
    <aside class="right-sidebar">
      <div class="brand">מערכת ליווי</div>

      <nav class="main-nav">
        <a href="/dashboard" class="nav-item"><span>דשבורד</span></a>
        <a href="/student-cases" class="nav-item"><span>תיקי סטודנטים</span></a>
        <a href="/tickets" class="nav-item active"><span>פניות ושיח יזום</span></a>
        <a href="/alerts" class="nav-item"><span>תגבורים והתאמות</span></a>
        <a href="/progress" class="nav-item"><span>התקדמות ומשחוק</span></a>
        <a href="/reports" class="nav-item"><span>דוחות ואחזור מידע</span></a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="settings-link">הגדרות</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-right">
          <h1 class="page-title">פניות ושיח יזום</h1>
        </div>

        <div class="topbar-center">
          <div class="search-box">
            <input type="text" id="ticketSearch" placeholder="חיפוש סטודנט / פנייה..." />
          </div>
        </div>

        <div class="topbar-left">
          <button class="icon-btn">🔔</button>
          <div class="user-name">פולינה (רכזת)</div>
        </div>
      </header>

      <main class="content">
        <section class="filters-card">
          <div class="filters-row">
            <div class="filter-group">
              <label>שנה סטודנטיאלית:</label>
              <input type="text" value='תשפ"ו (2025–2026)' />
            </div>

            <div class="filter-group">
              <label>שנה:</label>
              <input type="text" placeholder="שנה א" />
            </div>

            <div class="filter-group">
              <label>סמסטר:</label>
              <input type="text" placeholder="סמסטר א" />
            </div>
          </div>

          <div class="filters-row second-row">
            <div class="filter-group wide">
              <label>סינון:</label>
              <input type="text" id="filterInput" placeholder="שם/מס' סטודנט/סטטוס/נושא" />
            </div>
          </div>
        </section>

        <section class="table-card">
          <div class="details-header">
            <h3>פניות נכנסות</h3>
          </div>

          <table class="students-table">
            <thead>
              <tr>
                <th>מס'</th>
                <th>נמען</th>
                <th>נושא</th>
                <th>סטטוס</th>
                <th>פעולה</th>
              </tr>
            </thead>

            <tbody id="ticketsTableBody"></tbody>
          </table>

          <div class="footer-actions">
            <button class="secondary-link" onclick="window.location.href='/student-cases'">« חזור</button>

            <div style="display: flex; gap: 10px; align-items: center;">
              <a href="#" style="color: #339af0; text-decoration: none; font-weight: bold;">פניות יוצאות »</a>
              <button class="primary-btn" onclick="location.href='/new-ticket'">פנייה חדשה +</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="chatbot-bubble" id="globalChatbot" title="התייעצות עם הצ'אטבוט">
    <span>🤖</span>
    </div>

    <div class="chatbot-container" style="display: none;">
        <div class="chat-header">
            <h3>⚙️ עוזר AI - ליווי מילואים</h3>
            <button type="button" class="close-chat-btn" id="closeChat">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">שלום פולינה, במה אוכל לסייע לך בטיפול בפניות היום?</div>
        </div>
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="userMessage" placeholder="הקלידי שאלה או פרטי פנייה..." autocomplete="off" />
            <button type="submit">שלח</button>
        </form>
    </div>

    <script src="/JS/ticket.js"></script>
    <script src="/JS/chatbot.js"></script>
  </div>
  <script src="../python/static/chatbot.js"></script>
</body>
</html>
