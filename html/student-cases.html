<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תיקי סטודנטים - מערכת ליווי</title>
  <link rel="stylesheet" href="/CSS/site.css" />
  <link rel="stylesheet" href="/CSS/student-cases.css" />
  <link rel="stylesheet" href="/CSS/Chatbot.css" />
</head>
<body class="page">

  <div class="layout">

    <aside class="right-sidebar">
      <div class="brand">מערכת ליווי</div>

      <nav class="main-nav">
        <a href="/dashboard" class="nav-item" title="לא מיושם בסדנה">
          <span>דשבורד</span>
        </a>

        <a href="/student-cases" class="nav-item active">
          <span>תיקי סטודנטים</span>
        </a>

        <a href="/tickets" class="nav-item">
          <span>פניות ושיח יזום</span>
        </a>

        <a href="/adjustments" class="nav-item" title="לא מיושם בסדנה">
          <span>תגבורים והתאמות</span>
        </a>

        <a href="/progress" class="nav-item">
          <span>התקדמות ומשחוק</span>
        </a>

        <a href="/reports" class="nav-item" title="לא מיושם בסדנה">
          <span>דוחות ואחזור מידע</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="settings-link" title="לא מיושם בסדנה">הגדרות</a>
      </div>
    </aside>

    <div class="main-area">

      <header class="topbar">
        <div class="topbar-right">
          <h1 class="page-title">סטודנטים</h1>
        </div>

        <div class="topbar-center">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="חיפוש סטודנט / פנייה..." />
          </div>
        </div>

        <div class="topbar-left">
          <button class="icon-btn">🔔</button>
          <div class="user-name">פולינה (רכזת)</div>
        </div>
      </header>

      <main class="content">
        <section class="filters-card">
          <div class="filters-row">
            <div class="filter-group">
              <label>שנה סטודנטיאלית:</label>
              <input type="text" value='תשפ"ו (2025–2026)' />
            </div>

            <div class="filter-group">
              <label>שנה:</label>
              <input type="text" placeholder="שנה א" />
            </div>

            <div class="filter-group">
              <label>סמסטר:</label>
              <input type="text" placeholder="סמסטר א" />
            </div>
          </div>

          <div class="filters-row second-row">
            <div class="filter-group wide">
              <label>סינון:</label>
              <input type="text" id="filterInput" placeholder="שם/מס' סטודנט/סטטוס ליווי/סטטוס משימות" />
            </div>
          </div>
        </section>

        <section class="table-card">
          <table class="students-table">
            <thead>
              <tr>
                <th>מס' סטודנט</th>
                <th>שם</th>
                <th>סטטוס ליווי</th>
                <th>סטטוס משימות</th>
                <th>פעולה</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody"></tbody>
          </table>

          <div class="table-footer">
            <button class="secondary-link">«</button>
            <a href="/new-case" class="primary-btn big-btn"> פתיחת תיק חדש</a>                                                  
          </div>
        </section>
      </main>
    </div>

  </div>

  <script src="/JS/chatbot-widget.js"></script>
  <script src="/JS/student-cases.js"></script>
  <script src="/js/search.js"> </script>
</body>
</html>
