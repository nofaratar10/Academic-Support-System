<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תיק ליווי מלא - מערכת ליווי</title>
  <link rel="stylesheet" href="../CSS/site.css" />
<link rel="stylesheet" href="../CSS/student-details.css" />
</head>
<body class="page">

  <div class="layout">

    <aside class="right-sidebar">
      <div class="brand">מערכת ליווי</div>

      <nav class="main-nav">
        <a href="dashboard.html" class="nav-item">
          <span>דשבורד</span>
        </a>

        <a href="student-cases.html" class="nav-item active">
          <span>תיקי סטודנטים</span>
        </a>

        <a href="tickets.html" class="nav-item">
          <span>פניות ושיח יזום</span>
        </a>

        <a href="alerts.html" class="nav-item">
          <span>תגבורים והתאמות</span>
        </a>

        <a href="progress.html" class="nav-item">
          <span>התקדמות ומשחוק</span>
        </a>

        <a href="reports.html" class="nav-item">
          <span>דוחות ואחזור מידע</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="settings-link">הגדרות</a>
      </div>
    </aside>

    <div class="main-area">

      <header class="topbar">
        <div class="topbar-right">
          <h1 class="page-title">תיק ליווי</h1>
        </div>

        <div class="topbar-center">
          <div class="search-box">
            <input type="text" placeholder="חיפוש סטודנט / פנייה..." />
          </div>
        </div>

        <div class="topbar-left">
          <button class="icon-btn" type="button">🔔</button>
          <div class="user-name">פולינה (רכזת)</div>
        </div>
      </header>

      <section class="student-bar" aria-label="פרטי סטודנט">
        <h2 class="student-name" id="studentHeader">טוען פרטי סטודנט...</h2>
        <button
          class="back"
          type="button"
          aria-label="חזרה"
          onclick="window.location.href='student-cases.html'">
          ←
        </button>
      </section>

      <div class="tabs" role="tablist" aria-label="לשוניות תיק">
        <a class="tab active" id="detailsTab" href="student-details.html">פרטים</a>
        <a class="tab" id="documentsTab" href="case-documents.html">מסמכי התאמות</a>
        <a class="tab" id="planTab" href="case-plan.html">תוכנית ליווי</a>
        <a class="tab" id="summaryTab" href="student-summary.html">סיכומי שיחה</a>
      </div>

      <main class="content">
        <form id="studentForm">
          <section class="table-card details-shell">
            <div class="details-header">
              <h3>פרטים אישיים - סטודנט</h3>
            </div>

            <div class="details-body">
              <div class="details-grid">
                <div class="field">
                  <label for="name">שם מלא</label>
                  <input id="name" name="name" />
                </div>

                <div class="field">
                  <label for="track">חוג/מסלול</label>
                  <select id="track" name="track">
                    <option value="">בחרי מסלול</option>
                    <option>מערכות מידע</option>
                    <option>מדעי המחשב</option>
                    <option>עיצוב</option>
                  </select>
                </div>

                <div class="field">
                  <label for="idNumber">מזהה סטודנט</label>
                  <input id="idNumber" name="idNumber" readonly />
                </div>

                <div class="field">
                  <label for="year">שנה לימודים</label>
                  <select id="year" name="year">
                    <option value="">בחרי שנה</option>
                    <option>שנה א</option>
                    <option>שנה ב</option>
                    <option>שנה ג</option>
                    <option>שנה ד</option>
                  </select>
                </div>

                <div class="field">
                  <label for="phone">טלפון</label>
                  <input id="phone" name="phone" />
                </div>

                <div class="field">
                  <label for="semester">סמסטר</label>
                  <select id="semester" name="semester">
                    <option value="">בחרי סמסטר</option>
                    <option>סמסטר א</option>
                    <option>סמסטר ב</option>
                    <option>שנתי</option>
                  </select>
                </div>

                <div class="field">
                  <label for="email">אימייל</label>
                  <input id="email" name="email" />
                </div>

                <div class="field">
                  <label>סטטוס סטודנט</label>
                  <div>
                    <span class="status-pill status-open" id="statusPill">פתוח</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="table-footer details-footer">
              <button class="btn" type="button" id="refreshStudentBtn">רענון</button>
              <button class="primary-btn" type="submit">שמירה</button>
            </div>
          </section>
        </form>
      </main>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">הפרטים נשמרו</div>

  <script src="../JS/student-details.js"></script>
</body>
</html>
